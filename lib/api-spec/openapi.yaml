openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: IRUSA Smart Event & Donor Intelligence Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: Event management
  - name: logistics
    description: Event logistics tasks
  - name: revenue
    description: Revenue entries
  - name: frf
    description: Fund Receipt Forms
  - name: allocations
    description: Fund allocations
  - name: attendees
    description: Event attendees
  - name: donors
    description: Donor management
  - name: donations
    description: Donation records
  - name: followup
    description: Follow-up tasks
  - name: dashboard
    description: Dashboard summaries
  - name: reports
    description: Reports and analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ==================== EVENTS ====================
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List all events
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: eventType
          schema:
            type: string
        - in: query
          name: campaign
          schema:
            type: string
        - in: query
          name: location
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventBody"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get event by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Not found
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update event
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventBody"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete event
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /events/{id}/summary:
    get:
      operationId: getEventSummary
      tags: [events]
      summary: Get full event summary with revenue, logistics, and attendance stats
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventSummary"

  # ==================== LOGISTICS ====================
  /events/{eventId}/logistics:
    get:
      operationId: listLogisticsTasks
      tags: [logistics]
      summary: List logistics tasks for an event
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of logistics tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogisticsTask"
    post:
      operationId: createLogisticsTask
      tags: [logistics]
      summary: Create a logistics task
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLogisticsTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogisticsTask"

  /logistics/{id}:
    patch:
      operationId: updateLogisticsTask
      tags: [logistics]
      summary: Update a logistics task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLogisticsTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogisticsTask"
    delete:
      operationId: deleteLogisticsTask
      tags: [logistics]
      summary: Delete a logistics task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ==================== REVENUE ====================
  /events/{eventId}/revenue:
    get:
      operationId: listRevenueEntries
      tags: [revenue]
      summary: List revenue entries for an event
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Revenue entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueEntry"
    post:
      operationId: createRevenueEntry
      tags: [revenue]
      summary: Create revenue entry
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRevenueEntryBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueEntry"

  /revenue/{id}:
    patch:
      operationId: updateRevenueEntry
      tags: [revenue]
      summary: Update revenue entry
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRevenueEntryBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueEntry"
    delete:
      operationId: deleteRevenueEntry
      tags: [revenue]
      summary: Delete revenue entry
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ==================== FRF ====================
  /events/{eventId}/frf:
    get:
      operationId: getFRFRecord
      tags: [frf]
      summary: Get FRF record for an event
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: FRF record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FRFRecord"
        "404":
          description: Not found
    post:
      operationId: createFRFRecord
      tags: [frf]
      summary: Create or update FRF record
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFRFBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FRFRecord"

  /frf/{id}:
    patch:
      operationId: updateFRFRecord
      tags: [frf]
      summary: Update FRF record
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFRFBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FRFRecord"

  # ==================== ALLOCATIONS ====================
  /events/{eventId}/allocations:
    get:
      operationId: listAllocations
      tags: [allocations]
      summary: List fund allocations for an event
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Allocations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Allocation"
    post:
      operationId: createAllocation
      tags: [allocations]
      summary: Create allocation
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAllocationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Allocation"

  /allocations/{id}:
    patch:
      operationId: updateAllocation
      tags: [allocations]
      summary: Update allocation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAllocationBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Allocation"
    delete:
      operationId: deleteAllocation
      tags: [allocations]
      summary: Delete allocation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ==================== ATTENDEES ====================
  /events/{eventId}/attendees:
    get:
      operationId: listAttendees
      tags: [attendees]
      summary: List attendees for an event
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attendees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attendee"
    post:
      operationId: createAttendee
      tags: [attendees]
      summary: Add attendee to event
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttendeeBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attendee"

  /attendees/{id}:
    patch:
      operationId: updateAttendee
      tags: [attendees]
      summary: Update attendee
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAttendeeBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attendee"
    delete:
      operationId: deleteAttendee
      tags: [attendees]
      summary: Remove attendee
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /events/{eventId}/attendee-segments:
    get:
      operationId: getAttendeeSegments
      tags: [attendees]
      summary: Get attendee segmentation for an event
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Segmented attendees
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendeeSegments"

  # ==================== DONORS ====================
  /donors:
    get:
      operationId: listDonors
      tags: [donors]
      summary: List all donors
      parameters:
        - in: query
          name: donorCategory
          schema:
            type: string
        - in: query
          name: personalityType
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: Donors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Donor"
    post:
      operationId: createDonor
      tags: [donors]
      summary: Create donor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDonorBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donor"

  /donors/{id}:
    get:
      operationId: getDonor
      tags: [donors]
      summary: Get donor by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Donor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donor"
        "404":
          description: Not found
    patch:
      operationId: updateDonor
      tags: [donors]
      summary: Update donor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDonorBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donor"

  /donors/{id}/profile:
    get:
      operationId: getDonorProfile
      tags: [donors]
      summary: Get full donor profile with insights, donations, and events attended
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full donor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DonorProfile"

  /donors/{id}/recommendations:
    get:
      operationId: getDonorRecommendations
      tags: [donors]
      summary: Get AI-driven next-step recommendations for a donor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recommendation"

  # ==================== DONATIONS ====================
  /donations:
    get:
      operationId: listDonations
      tags: [donations]
      summary: List all donations
      parameters:
        - in: query
          name: donorId
          schema:
            type: integer
        - in: query
          name: eventId
          schema:
            type: integer
        - in: query
          name: cause
          schema:
            type: string
      responses:
        "200":
          description: Donations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Donation"
    post:
      operationId: createDonation
      tags: [donations]
      summary: Record a donation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDonationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donation"

  /donations/{id}:
    patch:
      operationId: updateDonation
      tags: [donations]
      summary: Update donation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDonationBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donation"
    delete:
      operationId: deleteDonation
      tags: [donations]
      summary: Delete donation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ==================== FOLLOW-UP TASKS ====================
  /follow-up-tasks:
    get:
      operationId: listFollowUpTasks
      tags: [followup]
      summary: List follow-up tasks
      parameters:
        - in: query
          name: eventId
          schema:
            type: integer
        - in: query
          name: donorId
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: Follow-up tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FollowUpTask"
    post:
      operationId: createFollowUpTask
      tags: [followup]
      summary: Create follow-up task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFollowUpTaskBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowUpTask"

  /follow-up-tasks/{id}:
    patch:
      operationId: updateFollowUpTask
      tags: [followup]
      summary: Update follow-up task status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFollowUpTaskBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowUpTask"

  /events/{eventId}/generate-followups:
    post:
      operationId: generateEventFollowUps
      tags: [followup]
      summary: Auto-generate follow-up tasks for a completed event
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FollowUpTask"

  # ==================== DASHBOARD ====================
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get overall dashboard metrics
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/alerts:
    get:
      operationId: getDashboardAlerts
      tags: [dashboard]
      summary: Get smart alerts and warnings
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /dashboard/donor-segments:
    get:
      operationId: getDonorSegments
      tags: [dashboard]
      summary: Get donor segment counts and summaries
      responses:
        "200":
          description: Donor segments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DonorSegmentSummary"

  /dashboard/top-events:
    get:
      operationId: getTopEvents
      tags: [dashboard]
      summary: Get top performing events by revenue and donor conversion
      responses:
        "200":
          description: Top events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventPerformance"

  /dashboard/upcoming-events:
    get:
      operationId: getUpcomingEvents
      tags: [dashboard]
      summary: Get upcoming events sorted by nearest date first
      responses:
        "200":
          description: Upcoming events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UpcomingEvent"

  # ==================== REPORTS ====================
  /reports/revenue-by-event:
    get:
      operationId: getRevenueByEvent
      tags: [reports]
      summary: Revenue breakdown by event
      responses:
        "200":
          description: Revenue by event
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueByEvent"

  /reports/donor-conversion:
    get:
      operationId: getDonorConversionReport
      tags: [reports]
      summary: Attendee-to-donor conversion stats by event
      responses:
        "200":
          description: Conversion report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DonorConversionReport"

  /reports/frf-status:
    get:
      operationId: getFRFStatusReport
      tags: [reports]
      summary: FRF reconciliation status overview
      responses:
        "200":
          description: FRF status report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FRFStatusReport"

  /reports/cause-interest:
    get:
      operationId: getCauseInterestReport
      tags: [reports]
      summary: Donations and donor interest by cause
      responses:
        "200":
          description: Cause interest
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CauseInterest"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ==================== EVENT ====================
    Event:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        date:
          type: string
        location:
          type: string
        masjidPartner:
          type: ["string", "null"]
        eventType:
          type: string
        campaign:
          type: ["string", "null"]
        organizer:
          type: ["string", "null"]
        status:
          type: string
        estimatedAttendees:
          type: ["integer", "null"]
        actualAttendees:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        totalRaised:
          type: number
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - date
        - location
        - eventType
        - status
        - createdAt
        - updatedAt

    CreateEventBody:
      type: object
      properties:
        name:
          type: string
        date:
          type: string
        location:
          type: string
        masjidPartner:
          type: ["string", "null"]
        eventType:
          type: string
        campaign:
          type: ["string", "null"]
        organizer:
          type: ["string", "null"]
        status:
          type: string
          default: "planned"
        estimatedAttendees:
          type: ["integer", "null"]
        actualAttendees:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
      required:
        - name
        - date
        - location
        - eventType

    UpdateEventBody:
      type: object
      properties:
        name:
          type: string
        date:
          type: string
        location:
          type: string
        masjidPartner:
          type: ["string", "null"]
        eventType:
          type: string
        campaign:
          type: ["string", "null"]
        organizer:
          type: ["string", "null"]
        status:
          type: string
        estimatedAttendees:
          type: ["integer", "null"]
        actualAttendees:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]

    EventSummary:
      type: object
      properties:
        event:
          $ref: "#/components/schemas/Event"
        totalRevenue:
          type: number
        revenueByPaymentType:
          type: object
          additionalProperties:
            type: number
        totalAllocated:
          type: number
        allocationBalance:
          type: number
        logisticsCompletion:
          type: number
        attendeeCount:
          type: integer
