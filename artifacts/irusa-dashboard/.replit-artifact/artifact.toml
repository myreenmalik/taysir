kind = "web"
previewPath = "/"
title = "IRUSA Smart Dashboard"
version = "1.0.0"
id = "artifacts/irusa-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24014

[services.development]
run = "pnpm --filter @workspace/irusa-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/irusa-dashboard", "run", "build" ]
publicDir = "artifacts/irusa-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24014"
BASE_PATH = "/"
